<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Church Meetings</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/meetings.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>

  <body>
    <div class="sidebar">
      <div class="logo">
        <h2>VIC YOUTH CONTRIBUTION</h2>

        <p>Contribution System</p>
      </div>

      <ul class="menu">
        <li>
          <a href="dashboard.html">
            <i class="fa-solid fa-house"></i>
            Dashboard
          </a>
        </li>

        <li>
          <a href="contribution.html">
            <i class="fa-solid fa-money-bill-wave"></i>

            Contributions
          </a>
        </li>

        <li>
          <a href="meetings.html">
            <i class="fa-solid fa-clipboard-list"></i>
            Meetings
          </a>
        </li>
        <li id="members-menu">
          <a href="members.html">
            <i class="fa-solid fa-users"></i>
            Members
          </a>
        </li>

        <li id="reports-menu">
          <a href="reports.html">
            <i class="fa-solid fa-chart-column"></i>
            Reports
          </a>
        </li>

        <li id="settings-menu">
          <a href="#">
            <i class="fa-solid fa-gear"></i>
            Settings
          </a>
        </li>
      </ul>

      <button id="logout">
        <i class="fa-solid fa-right-from-bracket"></i>

        Logout
      </button>
    </div>
    <div class="meetings-container">
      <header class="header">
        <div>
          <h1>
            <i class="fa-solid fa-calendar-days"></i>
            Meetings & Announcements
          </h1>

          <p>Manage church meetings, minutes and announcements</p>
        </div>

        <button
          class="add-btn"
          onclick="window.location.href = 'add-meeting.html'"
        >
          <i class="fa-solid fa-plus"></i>
          New Meeting
        </button>
      </header>

      <section class="stats">
        <div class="stat-card">
          <i class="fa-solid fa-calendar"></i>

          <div>
            <h3 id="total-meetings">0</h3>
            <p>Total Meetings</p>
          </div>
        </div>

        <div class="stat-card">
          <i class="fa-solid fa-clock"></i>

          <div>
            <h3 id="upcoming-meetings">0</h3>
            <p>Upcoming</p>
          </div>
        </div>

        <div class="stat-card">
          <i class="fa-solid fa-file-lines"></i>

          <div>
            <h3 id="minutes-uploaded">0</h3>
            <p>Minutes Uploaded</p>
          </div>
        </div>
      </section>

      <div class="search-section">
        <i class="fa-solid fa-search"></i>

        <input type="text" id="search" placeholder="Search meetings..." />
      </div>

      <!-- JavaScript will insert all meeting cards here -->
      <div id="meetings-list"></div>
    </div>

    <script type="module" src="js/load-meetings.js"></script>
  </body>
</html>
