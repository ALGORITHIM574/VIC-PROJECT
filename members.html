<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Members</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <div class="sidebar">
      <div class="logo">
        <h2>VIC YOUTH CONTRIBUTION</h2>

        <p>Contribution System</p>
      </div>

      <ul class="menu">
        <li>
          <a href="dashboard.html">
            <i class="fa-solid fa-house"></i>
            Dashboard
          </a>
        </li>

        <li>
          <a href="meetings.html">
            <i class="fa-solid fa-clipboard-list"></i>
            Meetings
          </a>
        </li>
        <li id="members-menu">
          <a href="members.html">
            <i class="fa-solid fa-users"></i>
            Members
          </a>
        </li>

        <li id="reports-menu">
          <a href="reports.html">
            <i class="fa-solid fa-chart-column"></i>
            Reports
          </a>
        </li>

        <li id="settings-menu">
          <a href="#">
            <i class="fa-solid fa-gear"></i>
            Settings
          </a>
        </li>
      </ul>

      <button id="logout">
        <i class="fa-solid fa-right-from-bracket"></i>

        Logout
      </button>
    </div>
    <div class="tables-2">
      <div class="main-member">
        <h2>Church Members</h2>

        <button id="btn-2">
          <i class="fa-solid fa-user-plus"></i>
          Add Member
        </button>
      </div>

      <table class="members-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Full Name</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Date Joined</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="members-body">
          <!-- Members from Supabase appear here -->
        </tbody>
      </table>
    </div>

    <div id="overlay"></div>

    <div id="modal-2">
      <h2>Add Member</h2>

      <div class="details-2">
        <input type="text" id="full-name" placeholder="Full Name" required />

        <input type="text" id="phone" placeholder="Phone Number" required />

        <input type="email" id="email" placeholder="Email Address" required />

        <input type="date" id="date-joined" required />
      </div>

      <button id="save">
        <i class="fa-solid fa-floppy-disk"></i>
        Save Member
      </button>
    </div>
    <!-- the toast -->
    <div id="edit-modal">
      <h2>Edit Member</h2>

      <input type="hidden" id="edit-id" />

      <input type="text" id="edit-name" placeholder="Full Name" />

      <input type="text" id="edit-phone" placeholder="Phone" />

      <input type="email" id="edit-email" placeholder="Email" />

      <input type="date" id="edit-date" />

      <select id="edit-role">
        <option value="Member">Member</option>

        <option value="secretary">Secretary</option>

        <option value="admin">Admin</option>
      </select>

      <select id="edit-status">
        <option value="Approved">Approved</option>

        <option value="Pending">Pending</option>

        <option value="Rejected">Rejected</option>
      </select>

      <div class="buttons">
        <button id="cancel-edit">Cancel</button>

        <button id="update-member">Save Changes</button>
      </div>
    </div>

    <script type="module" src="js/members.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
