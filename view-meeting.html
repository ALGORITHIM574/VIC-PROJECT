<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>View Meeting</title>

    <link rel="stylesheet" href="css/view-meeting.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>

  <body>
    <div class="container">
      <h1 id="title">Loading...</h1>

      <div class="info">
        <p><strong>Date:</strong> <span id="meeting-date"></span></p>

        <p><strong>Location:</strong> <span id="location"></span></p>
      </div>

      <div class="section">
        <h2>Agenda</h2>

        <p id="agenda"></p>
      </div>

      <div class="section">
        <h2>Minutes</h2>

        <p id="minutes"></p>
      </div>

      <button onclick="history.back()">← Back</button>
    </div>

    <script type="module" src="js/veiw-meeting.js"></script>
  </body>
</html>
